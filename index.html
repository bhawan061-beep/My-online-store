<!DOCTYPE html>
<html lang="ur">
<head><meta name="google-site-verification" content="thdhNv5Z8OMmt4hkBybMsqiaY4019L4BkkuKgLlhkKA" /<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آن لائن اسٹور</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        .store-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .product-card {
            background: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            width: 250px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .product-card h3 {
            margin: 10px 0;
            color: #333;
        }
        .product-price {
            color: #d9534f;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .buy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .buy-btn:hover {
            background: #218838;
        }
        /* پاپ اپ آرڈر فارم اسٹائل */
        #globalOrderForm {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            padding: 20px;
            box-shadow: 0px -4px 15px rgba(0,0,0,0.2);
            text-align: right;
            box-sizing: border-box;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }
        #globalOrderForm input, #globalOrderForm textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-actions {
            display: flex;
            gap: 10px;
        }
        .submit-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px;
            flex: 1;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .close-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>خوش آمدید! ہمارا آن لائن اسٹور</h1>
    <p>اپنی پسندیدہ چیز منتخب کریں اور آرڈر کریں</p>

    <!-- پروڈکٹس کی لسٹ -->
    <div class="store-container">
        
        <!-- پروڈکٹ 1 -->
        <div class="product-card">
            <h3>اسمارٹ ہیڈ فون</h3>
            <div class="product-price">4,200 روپے</div>
            <button class="buy-btn" onclick="selectProduct(this)">خریدیں (Buy Now)</button>
        </div>

        <!-- پروڈکٹ 2 -->
        <div class="product-card">
            <h3>اسپورٹس شوز</h3>
            <div class="product-price">6,000 روپے</div>
            <button class="buy-btn" onclick="selectProduct(this)">خریدیں (Buy Now)</button>
        </div>

        <!-- پروڈکٹ 3 -->
        <div class="product-card">
            <h3>اسمارٹ واچ</h3>
            <div class="product-price">3,500 روپے</div>
            <button class="buy-btn" onclick="selectProduct(this)">خریدیں (Buy Now)</button>
        </div>

    </div>

    <!-- آرڈر کا چھپا ہوا فارم جو کلک کرنے پر شو ہوگا -->
    <div id="globalOrderForm">
        <h3>آرڈر کی تفصیلات</h3>
        <p>منتخب کردہ پروڈکٹ: <span id="selectedProduct" style="color: #d9534f; font-weight: bold;"></span></p>
        
        <label>اپنا مکمل پتہ (Address) لکھیں:</label>
        <textarea id="finalAddress" placeholder="گھر کا نمبر، محلہ، شہر..."></textarea>
        
        <label>فون نمبر:</label>
        <input type="text" id="finalPhone" placeholder="03XXXXXXXXX">
        
        <div class="form-actions">
            <button class="submit-btn" onclick="confirmOrder()">آرڈر پکا کریں</button>
            <button class="close-btn" onclick="closeGlobalForm()">بند کریں</button>
        </div>
    </div>

    <!-- جاوا اسکرپٹ کوڈ -->
    <script>
        let chosenItem = "";

        function selectProduct(button) {
            let card = button.parentElement;
            let productName = card.querySelector("h3").innerText;
            let productPrice = card.querySelector(".product-price").innerText;
            
            chosenItem = productName + " (" + productPrice + ")";
            
            document.getElementById("selectedProduct").innerText = chosenItem;
            document.getElementById("globalOrderForm").style.display = "block";
        }

        function closeGlobalForm() {
            document.getElementById("globalOrderForm").style.display = "none";
        }

        function confirmOrder() {
            let address = document.getElementById("finalAddress").value;
            let phone = document.getElementById("finalPhone").value;
            
            if(address === "" || phone === "") {
                alert("برائے مہربانی اپنا پتہ اور فون نمبر درج کریں!");
            } else {
                alert("مبارک ہو! آپ کا آرڈر (" + chosenItem + ") کامیابی سے موصول ہو گیا ہے۔");
                document.getElementById("globalOrderForm").style.display = "none";
                // فارم صاف کرنے کے لیے
                document.getElementById("finalAddress").value = "";
                document.getElementById("finalPhone").value = "";
            }
        }
    </script>

</body>
</html>
